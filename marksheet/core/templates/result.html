{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-[#fafafa] pt-32 pb-20 px-4 flex items-center justify-center">

    <div class="max-w-xl w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2 uppercase">
                Result <span class="text-indigo-600">Portal</span>
            </h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Verify Academic Performance</p>
        </div>

        <div class="bg-white border border-slate-200 rounded-[3rem] p-10 shadow-2xl shadow-slate-200/50">

            <form method="get" action="{% url 'result' %}" class="mb-8">
                <input type="hidden" name="state" value="{{ state_id }}">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Official School Name</label>
                    <select name="school" onchange="this.form.submit()" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-bold text-slate-700 focus:ring-4 focus:ring-indigo-500/5 transition-all outline-none">
                        <option value="">Select your institution</option>
                        {% for school in schools %}
                            <option value="{{ school.id }}" {% if school.id|stringformat:"s" == school_id %}selected{% endif %}>
                                {{ school.school_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </form>

            <div class="h-px bg-slate-100 w-full mb-10"></div>

            <form action="{% url 'showresult' %}" method="post" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="state_id" value="{{ state_id }}">
                <input type="hidden" name="school_id" value="{{ school_id }}">

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Grade (1-12)</label>
                        <input type="number" name="grade" placeholder="e.g. 10" required 
                            class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-bold text-slate-700 focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Section</label>
                        <input type="text" name="section" placeholder="e.g. A" maxlength="1" required 
                            class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-bold text-slate-700 focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500 outline-none transition-all uppercase">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Assessment Cycle</label>
                    <select name="exam" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-bold text-slate-700 focus:ring-4 focus:ring-indigo-500/5 transition-all outline-none">
                        <option value="Half Yearly">Half Yearly Exam</option>
                        <option value="Final">Final Examination</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Roll Number</label>
                        <input type="text" name="roll_no" placeholder="Roll No" required 
                            class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-bold text-slate-700 focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Birth Date</label>
                        <input type="date" name="dob" required 
                            class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-bold text-slate-700 focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500 outline-none transition-all">
                    </div>
                </div>

                <button type="submit" {% if not school_id %}disabled{% endif %} 
                    class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black uppercase tracking-[0.2em] text-[10px] hover:bg-indigo-600 transition-all shadow-xl shadow-slate-200 mt-4 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    Generate Transcript
                </button>
            </form>

        </div>
    </div>
    
</div>
{% endblock %}
