{% extends "base.html" %}
{% block content %}

<div class="min-h-screen bg-[#fafafa] pt-32 pb-20 px-4 sm:px-6 lg:px-8 flex items-center justify-center">

    <div class="max-w-xl w-full">

        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2">
                Result <span class="text-indigo-600">Verification</span>
            </h1>
            <p class="text-slate-500 font-medium">
                Please select your details to view your result.
            </p>
        </div>

        <div class="bg-white border border-slate-200 rounded-[3rem] p-10 shadow-2xl shadow-slate-200/50">

            <!-- FORM START -->
            <form action="{% url 'showResult' %}" method="POST" class="space-y-6">
                {% csrf_token %}

                <!-- Hidden state -->
                <input type="hidden" name="state_id" value="{{ state_id }}">

                <!-- SCHOOL -->
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">
                        School Name
                    </label>

                    <select 
                        onchange="window.location.href='?state={{ state_id }}&school=' + this.value"
                        class="w-full bg-slate-50 rounded-2xl px-6 py-4 font-bold cursor-pointer">

                        <option value="">Select your school</option>

                        {% for school in schools %}
                            <option value="{{ school.id }}"
                                {% if school.id|stringformat:"s" == school_id %}selected{% endif %}>
                                {{ school.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- CLASSROOM -->
                {% if classrooms %}
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">
                        Classroom
                    </label>

                    <select 
                        onchange="window.location.href='?state={{ state_id }}&school={{ school_id }}&classroom=' + this.value"
                        class="w-full bg-slate-50 rounded-2xl px-6 py-4 font-bold cursor-pointer">

                        <option value="">Select your classroom</option>

                        {% for c in classrooms %}
                            <option value="{{ c.id }}"
                                {% if c.id|stringformat:"s" == class_id %}selected{% endif %}>
                                Grade {{ c.name }} — Section {{ c.section }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <!-- STUDENT -->
                {% if students %}
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">
                        Roll Number
                    </label>

                    <select name="roll_no" required
                        class="w-full bg-slate-50 rounded-2xl px-6 py-4 font-bold cursor-pointer">

                        <option value="">Select your Roll Number</option>

                        {% for s in students %}
                            <option value="{{ s.id }}">
                                {{ s.roll_no }} — {{ s.studentName }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <!-- SUBMIT BUTTON -->
                {% if students %}
                <button type="submit"
                    class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg hover:bg-indigo-600 transition-all">
                    Search Results
                </button>
                {% endif %}

            </form>
            <!-- FORM END -->

        </div>

    </div>

</div>

{% endblock %}
