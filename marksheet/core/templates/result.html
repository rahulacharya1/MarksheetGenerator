{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-[#fafafa] pt-32 pb-20 px-4 sm:px-6 lg:px-8 flex items-center justify-center">

    <div class="max-w-xl w-full">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 text-white rounded-[2rem] shadow-xl shadow-indigo-100 mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2">Result <span class="text-indigo-600">Verification</span></h1>
            <p class="text-slate-500 font-medium">Please enter your academic credentials to view your transcript.</p>
        </div>

        <div class="bg-white border border-slate-200 rounded-[3rem] p-10 shadow-2xl shadow-slate-200/50">
            <form action="" method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">School Name</label>
                    <div class="relative">
                        <select name="school_name" required class="w-full outline-none bg-slate-50 border-none rounded-2xl px-6 py-4 focus:ring-4 focus:ring-indigo-500/10 text-slate-700 font-bold appearance-none transition-all cursor-pointer">
                            <option value="" disabled selected>Select your school</option>
                            {% for school in schools %}
                            <option value="{{ school.id }}">{{ school.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Class / Grade</label>
                        <input type="text" name="class_name" placeholder="e.g. 10" required 
                            class="w-full bg-slate-50 outline-none border-none rounded-2xl px-6 py-4 focus:ring-4 focus:ring-indigo-500/10 text-slate-700 font-bold placeholder:text-slate-300 transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Section</label>
                        <input type="text" name="section" placeholder="e.g. A" required 
                            class="w-full bg-slate-50 outline-none border-none rounded-2xl px-6 py-4 focus:ring-4 focus:ring-indigo-500/10 text-slate-700 font-bold placeholder:text-slate-300 transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Roll Number</label>
                    <div class="relative">
                        <input type="number" name="roll_no" placeholder="Enter your unique roll number" required 
                            class="w-full bg-slate-50 outline-none border-none rounded-2xl px-6 py-4 focus:ring-4 focus:ring-indigo-500/10 text-slate-700 font-bold placeholder:text-slate-300 transition-all">
                        <div class="absolute inset-y-0 right-0 flex items-center px-4 text-slate-300">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg hover:bg-indigo-600 transition-all shadow-xl shadow-indigo-100 group">
                    <span class="flex items-center justify-center gap-2">
                        Search Results
                        <svg class="w-6 h-6 transform group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                    </span>
                </button>
            </form>
        </div>

        <p class="text-center mt-8 text-slate-400 text-sm">
            Problems finding your result? <a href="#" class="text-indigo-600 font-bold hover:underline">Contact Administration</a>
        </p>

    </div>

</div>
{% endblock %}
