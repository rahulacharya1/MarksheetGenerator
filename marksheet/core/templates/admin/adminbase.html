<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMarks | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#fafafa] antialiased">

    <header class="fixed top-0 inset-x-0 z-50 p-4 md:p-6">
        <nav class="max-w-7xl mx-auto bg-white/80 backdrop-blur-xl border border-slate-200 rounded-[2rem] px-6 py-4 flex items-center justify-between shadow-xl shadow-slate-200/50">
            <a href="{% url 'admin-dashboard' %}" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white transition-transform group-hover:rotate-12">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                </div>
                <span class="text-xl font-black text-slate-900 tracking-tighter">EduMarks</span>
            </a>

            <div class="flex items-center gap-4">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Admin Account</p>
                <a href="" class="w-10 h-10 bg-indigo-50 border border-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </a>
            </div>
        </nav>
    </header>

    <main class="relative z-10">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-slate-200 pt-16 pb-8 px-4 sm:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-12">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white font-black text-xs">E</div>
                        <span class="text-lg font-black text-slate-900 tracking-tighter">EduMarks</span>
                    </div>
                    <p class="text-slate-500 text-sm max-w-xs font-medium">The modern standard for academic performance tracking and institutional reporting.</p>
                </div>
                
                <div class="flex flex-wrap gap-8 md:gap-16">
                    <div class="space-y-4">
                        <p class="text-[10px] font-black text-slate-900 uppercase tracking-widest">Platform</p>
                        <ul class="space-y-2 text-sm font-bold text-slate-500">
                            <li><a href="{% url 'documentation' %}" class="hover:text-indigo-600 transition-colors">Documentation</a></li>
                            <li><a href="#" class="hover:text-indigo-600 transition-colors">Updates</a></li>
                        </ul>
                    </div>
                    <div class="space-y-4">
                        <p class="text-[10px] font-black text-slate-900 uppercase tracking-widest">Legal</p>
                        <ul class="space-y-2 text-sm font-bold text-slate-500">
                            <li><a href="#" class="hover:text-indigo-600 transition-colors">Privacy</a></li>
                            <li><a href="#" class="hover:text-indigo-600 transition-colors">Terms</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="pt-8 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <p class="text-slate-400 text-xs font-medium uppercase tracking-widest">&copy; 2026 EduMarks Inc. All rights reserved.</p>
                <div class="flex gap-4">
                    <span class="px-3 py-1 bg-slate-50 text-slate-400 text-[10px] font-black rounded-full border border-slate-100">STABLE V1.4</span>
                    <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-black rounded-full border border-emerald-100">SERVER ONLINE</span>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
