{% extends "admin/adminbase.html" %}

{% block content %}
<div class="min-h-screen pt-32 pb-20 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Add New <span class="text-indigo-600">State</span></h1>
                <p class="text-slate-500 font-medium mt-1">Register a new regional boundary for institutional sorting.</p>
            </div>
            
            <a href="{% url "viewstate" %}" class="inline-flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 hover:bg-slate-50 transition-all shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                View Existing States
            </a>
        </div>

        <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-slate-200/50">
            <form action="" method="post" class="space-y-8">
                {% csrf_token %}
                
                <div class="space-y-2">
                    <label for="name" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-4">State Name</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                        <input 
                            type="text" 
                            name="name" 
                            id="name" 
                            placeholder="e.g. California or Maharashtra" 
                            required
                            class="w-full pl-14 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-bold text-slate-900 placeholder:text-slate-300"
                        >
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-indigo-600 transition-all shadow-xl shadow-slate-200 flex items-center justify-center gap-3 group">
                        Confirm & Register State
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                    </button>
                    <p class="text-center text-[10px] font-black text-slate-300 uppercase tracking-widest mt-6 italic">Ensure spelling is correct before submission</p>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
