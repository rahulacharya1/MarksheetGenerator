{% extends "admin/adminbase.html" %}

{% block content %}
<div class="min-h-screen pt-32 pb-20 px-4 sm:px-6 lg:px-8 bg-slate-50/50">
    <div class="max-w-3xl mx-auto">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">
                    Add New <span class="text-indigo-600">Subject</span>
                </h1>
                <p class="text-slate-500 font-medium mt-2">Create a new academic entry for the curriculum database.</p>
            </div>
            
            <a href="{% url "viewSubject" %}" class="inline-flex items-center gap-2 px-6 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 hover:bg-slate-50 hover:border-indigo-200 transition-all shadow-sm group">
                <svg class="w-5 h-5 text-slate-400 group-hover:text-indigo-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                </svg>
                View All Subjects
            </a>
        </div>

        <div class="bg-white border border-slate-200 rounded-[3rem] p-10 md:p-14 shadow-2xl shadow-slate-200/60 transition-all">
            <form action="" method="post" class="space-y-10">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 gap-8">
                    <div class="space-y-3">
                        <label for="name" class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-2">
                            Subject Title
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-indigo-600 transition-colors">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                                </svg>
                            </div>
                            <input 
                                type="text" 
                                name="name" 
                                id="name" 
                                placeholder="e.g. Advanced Mathematics" 
                                required
                                class="w-full pl-16 pr-6 py-5 bg-slate-50 border-2 border-transparent rounded-[1.5rem] focus:outline-none focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500 focus:bg-white transition-all font-bold text-slate-900 placeholder:text-slate-300"
                            >
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" class="w-full py-5 bg-slate-900 text-white rounded-[1.5rem] font-black uppercase tracking-widest text-xs hover:bg-indigo-600 hover:-translate-y-1 active:scale-[0.98] transition-all shadow-xl shadow-indigo-200/20 flex items-center justify-center gap-3 group">
                        Confirm & Register Subject
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                        </svg>
                    </button>
                    
                    <div class="flex items-center justify-center gap-4 mt-10">
                        <span class="h-px w-12 bg-slate-100"></span>
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Official Database Entry</p>
                        <span class="h-px w-12 bg-slate-100"></span>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
