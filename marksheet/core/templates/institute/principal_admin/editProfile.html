{% extends "base.html" %}
{% block content %}

<div class="max-w-3xl mx-auto bg-white pt-32 pb-28 px-10">

    <h2 class="text-2xl font-bold mb-6 text-slate-800">Edit Profile</h2>

    {% if error %}
    <div class="mb-4 p-3 bg-red-100 text-red-600 rounded">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        <!-- School Name (readonly) -->
        <div>
            <label class="block text-sm font-medium">School Name</label>
            <input type="text" value="{{ school.school_name }}" readonly
                class="w-full mt-1 p-2 border rounded bg-gray-100">
        </div>

        <!-- Email (readonly) -->
        <div>
            <label class="block text-sm font-medium">Email</label>
            <input type="text" value="{{ school.official_email }}" readonly
                class="w-full mt-1 p-2 border rounded bg-gray-100">
        </div>

        <!-- Phone -->
        <div>
            <label class="block text-sm font-medium">Phone</label>
            <input type="text" name="phone" value="{{ school.phone }}"
                class="w-full mt-1 p-2 border rounded">
        </div>

        <!-- Pincode -->
        <div>
            <label class="block text-sm font-medium">Pincode</label>
            <input type="text" name="pincode" value="{{ school.pincode }}"
                class="w-full mt-1 p-2 border rounded">
        </div>

        <!-- Affiliation -->
        <div>
            <label class="block text-sm font-medium">Affiliation Number</label>
            <input type="text" name="affiliation_number" value="{{ school.affiliation_number }}"
                class="w-full mt-1 p-2 border rounded">
        </div>

        <!-- Logo -->
        <div>
            <label class="block text-sm font-medium">School Logo</label>
            <input type="file" name="logo" class="w-full mt-1">
        </div>

        <!-- Submit -->
        <button type="submit"
            class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">
            Update Profile
        </button>

    </form>

</div>

{% endblock %}
