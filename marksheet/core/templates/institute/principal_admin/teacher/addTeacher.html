{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-[#fafafa] pt-32 pb-20 px-4">

    <div class="max-w-4xl mx-auto">
        <div class="flex items-center mb-10">
            <a href="{% url 'manageteachers' %}" class="group flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-black uppercase text-[10px] tracking-[0.2em] transition-colors">
                <svg class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
                Back to Management
            </a>
        </div>

        <div class="bg-white border border-slate-200 rounded-[3rem] shadow-sm overflow-hidden flex flex-col md:flex-row min-h-[600px]">
            <div class="hidden md:block w-1/3 bg-slate-900 p-12 text-white relative overflow-hidden">
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-indigo-500/10 rounded-full blur-3xl"></div>
                <div class="relative z-10 space-y-10">
                    <div>
                        <nav class="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.3em] text-indigo-400 mb-4">
                            <span class="w-2 h-2 rounded-full bg-indigo-500"></span> Faculty Registry
                        </nav>
                        <h3 class="text-2xl font-black tracking-tighter">Teacher<br>Onboarding<span class="text-indigo-500">.</span></h3>
                    </div>
                </div>
            </div>

            <div class="flex-1 p-10 md:p-16">
                <h2 class="text-3xl font-black text-slate-900 tracking-tighter mb-8">Onboard <span class="text-indigo-600">Faculty</span></h2>

                <form method="GET" class="mb-10 p-6 bg-slate-50 rounded-[2rem] border border-slate-100 space-y-4">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Step 1: Select Academic Session</label>
                    <div class="flex gap-3">
                        <select name="year_filter" class="flex-1 bg-white border border-slate-200 rounded-xl px-4 py-3 font-bold text-slate-700 outline-none focus:border-indigo-500 transition-all">
                            <option value="">Select Year</option>
                            {% for year in academic_years %}
                                <option value="{{ year.id }}" {% if selected_year.id == year.id %}selected{% endif %}>{{ year.year }}</option>
                            {% endfor %}
                        </select>
                        <button type="submit" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-900 transition-all">
                            Fetch Classes
                        </button>
                    </div>
                </form>

                {% if selected_year %}
                <form method="POST" class="space-y-6 animate-in fade-in duration-500">
                    {% csrf_token %}
                    
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Full Legal Name</label>
                        <input type="text" name="name" placeholder="John Doe" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 font-bold outline-none focus:bg-white focus:border-indigo-500 transition-all" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" name="username" placeholder="Username" class="bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 font-bold outline-none focus:bg-white focus:border-indigo-500 transition-all" required>
                        <input type="password" name="password" placeholder="Password" class="bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 font-bold outline-none focus:bg-white focus:border-indigo-500 transition-all" required>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Assign Classroom ({{ selected_year.year }})</label>
                        <select name="classroom" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 font-bold text-slate-700 outline-none focus:bg-white focus:border-indigo-500 transition-all" required>
                            <option value="" disabled selected>Choose class node...</option>
                            {% for class in classrooms %}
                                <option value="{{ class.id }}">Grade {{ class.name }} — Section {{ class.section }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-indigo-600 transition-all flex items-center justify-center gap-3">
                        Initialize Protocol <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" /></svg>
                    </button>
                </form>
                {% else %}
                <div class="text-center py-10 border-2 border-dashed border-slate-100 rounded-[2rem]">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Please select an academic year above to continue.</p>
                </div>
                {% endif %}
            </div>
        </div>

        {% if error %}
        <div class="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center gap-3 animate-in fade-in slide-in-from-top-2">
            <i class="fas fa-circle-exclamation text-rose-500"></i>
            <p class="text-rose-700 text-xs font-black uppercase tracking-widest">{{ error }}</p>
        </div>
        {% endif %}
    </div>
    
</div>
{% endblock %}
