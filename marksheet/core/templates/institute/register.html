{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-[#fafafa] flex items-center justify-center pt-32 pb-10 px-4">

    <div class="max-w-6xl w-full bg-white border border-slate-200 rounded-[3rem] shadow-sm overflow-hidden flex flex-col lg:flex-row">

        <div class="hidden lg:flex w-1/3 bg-indigo-600 p-12 text-white flex-col justify-between relative overflow-hidden">
            <div class="relative z-10">
                <h3 class="text-3xl font-black mb-6 leading-tight">Onboard Your Institution.</h3>
                <ul class="space-y-6">
                    <li class="flex items-start gap-4">
                        <div class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center mt-1"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>
                        <p class="font-bold text-sm">Automated Reporting</p>
                    </li>
                </ul>
            </div>
            <div class="relative z-10 pt-10 border-t border-white/10 text-xs italic">Join 500+ schools using EduMarks today.</div>
        </div>

        <div class="flex-1 p-8 sm:p-12 lg:p-16">
            <div class="mb-10 text-center lg:text-left">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Create <span class="text-indigo-600">Account</span></h2>
                <p class="text-slate-500 mt-2 text-sm">Initialize your administrative dashboard in minutes.</p>
            </div>

            <form class="space-y-6" method="post">
                {% csrf_token %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2 space-y-2">
                        <label class="block text-sm font-bold text-slate-700">Institute Name</label>
                        <input type="text" name="first_name" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-indigo-500" placeholder="e.g. Global Heights Academy">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-slate-700">Official Email</label>
                        <input type="email" name="email" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-indigo-500" placeholder="admin@school.com">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-slate-700">Admin Username</label>
                        <input type="text" name="username" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-indigo-500" placeholder="e.g. school_admin">
                    </div>
                    <div class="md:col-span-2 space-y-2">
                        <label class="block text-sm font-bold text-slate-700">Secure Password</label>
                        <input type="password" name="password" required minlength="6" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-indigo-500" placeholder="Minimum 6 characters">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-indigo-600 shadow-xl transition-all flex items-center justify-center gap-3">
                        Launch Dashboard
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6" stroke-width="2"/></svg>
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-50 text-center">
                <p class="text-slate-500 text-sm">Already managing an institute? <a href="{% url 'login' %}?state={{ request.GET.state }}" class="text-indigo-600 font-black hover:underline ml-1">Sign In</a></p>
            </div>
        </div>

    </div>
    
</div>
{% endblock %}
