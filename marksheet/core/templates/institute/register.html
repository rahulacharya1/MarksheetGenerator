{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-[#fafafa] flex items-center justify-center pt-32 pb-20 px-4 sm:px-6">

    <div class="max-w-5xl w-full bg-white border border-slate-200 rounded-[3rem] shadow-2xl shadow-slate-200/50 p-8 sm:p-16 relative overflow-hidden">
        
        <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-indigo-50 rounded-full blur-3xl opacity-50"></div>

        <div class="mb-12 text-center relative">
            <h2 class="text-4xl font-black text-slate-900 tracking-tight">
                School <span class="text-indigo-600">Registration</span>
            </h2>
            <p class="text-slate-500 mt-3 font-medium">
                Establish your institution's digital presence and admin control.
            </p>
        </div>

        <form method="post" enctype="multipart/form-data" class="space-y-12 relative">
            {% csrf_token %}

            <section class="space-y-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    </div>
                    <h3 class="text-xl font-black text-slate-800 tracking-tight">Institution Profile</h3>
                </div>
                
                <div class="grid md:grid-cols-2 gap-x-8 gap-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">School Name</label>
                        <input type="text" name="school_name" required placeholder="e.g. St. Xavier's High" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Established Year</label>
                        <input type="number" name="established_year" placeholder="YYYY" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Education Board</label>
                        <select name="board" required class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200 appearance-none">
                            <option value="">Select Board</option>
                            <option>CBSE</option>
                            <option>ICSE</option>
                            <option>State Board</option>
                            <option>IB</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Affiliation No.</label>
                        <input type="text" name="affiliation_number" placeholder="Registration ID" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200">
                    </div>
                </div>
            </section>

            <section class="space-y-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </div>
                    <h3 class="text-xl font-black text-slate-800 tracking-tight">Contact & Location</h3>
                </div>
                
                <div class="grid md:grid-cols-2 gap-x-8 gap-y-6">
                    <input type="email" name="official_email" required placeholder="Official Email Address" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200">
                    <input type="tel" name="phone" required placeholder="Official Phone Number" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200">
                    <input type="text" name="pincode" required placeholder="PIN Code" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200 md:col-span-2">
                </div>
            </section>

            <section class="space-y-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-8 h-8 bg-amber-100 text-amber-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </div>
                    <h3 class="text-xl font-black text-slate-800 tracking-tight">Security Credentials</h3>
                </div>
                
                <div class="grid md:grid-cols-2 gap-x-8 gap-y-6">
                    <input type="text" name="admin_name" required placeholder="Principal / Admin Full Name" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200">
                    <input type="text" name="username" required placeholder="Assign Admin Username" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200">
                    <input type="password" name="password" required minlength="6" placeholder="Password" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200">
                    <input type="password" name="confirm_password" required placeholder="Confirm Password" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-slate-900 placeholder:text-slate-400 placeholder:font-mediumfocus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 transition-all duration-200">
                </div>
            </section>

            <div class="grid md:grid-cols-3 gap-6 w-full">
    
                <div class="flex-1 p-8 bg-slate-50 rounded-[2rem] border border-slate-100">
                    <h3 class="text-sm font-bold mb-4 text-slate-700 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Registration Certificate
                    </h3>
                    <input type="file" name="registration_certificate" accept=".pdf" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 transition-all cursor-pointer">
                </div>
            
                <div class="flex-1 p-8 bg-slate-50 rounded-[2rem] border border-slate-100">
                    <h3 class="text-sm font-bold mb-4 text-slate-700 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        School Logo
                    </h3>
                    <input type="file" name="logo" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 transition-all cursor-pointer">
                </div>

                <div class="p-8 bg-slate-50 rounded-[2rem] border border-slate-100">
                   <h3 class="text-sm font-bold mb-4 text-slate-700 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Principal Signature
                   </h3>
                   <input type="file" name="principal_sign" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 transition-all cursor-pointer">
               </div>
            
            </div>

            <div class="flex items-center gap-3 px-2">
                <input type="checkbox" required class="w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
                <label class="text-sm text-slate-500 font-medium">
                    I agree to the <a href="#" class="text-indigo-600 underline">Terms & Conditions</a> and <a href="#" class="text-indigo-600 underline">Privacy Policy</a>
                </label>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-indigo-600 hover:-translate-y-1 active:scale-[0.98] transition-all shadow-xl shadow-indigo-100 flex items-center justify-center gap-3">
                    Create School Account
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                </button>
            </div>
        </form>
    </div>
    
</div>
{% endblock %}
